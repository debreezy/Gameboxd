<style>
  .home-page {
    max-width: 1080px;
    margin: 0 auto;
    padding: 36px 24px 80px;
  }

  /* ── Welcome banner ── */
  .welcome-banner {
    text-align: center;
    padding: 28px 0 40px;
    border-bottom: 1px solid var(--border-faint);
    margin-bottom: 40px;
    display: none;
  }

  .welcome-text {
    font-size: 15px;
    color: var(--text-secondary);
  }

  .welcome-text strong {
    color: var(--text-primary);
    font-weight: 600;
    border-bottom: 1px solid var(--accent);
  }

  /* ── Section headers ── */
  .home-section { 
    margin-bottom: 56px;
    position: relative;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-faint);
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .section-more {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    transition: all 0.2s;
    padding: 4px 8px;
    border-radius: 3px;
  }
  .section-more:hover { 
    color: var(--accent);
    background: var(--bg-subtle);
  }

  /* ── Cover grid (popular games) ── */
  .cover-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  
  @media (max-width: 768px) {
    .cover-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
  }
  
  @media (max-width: 480px) {
    .cover-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
  }

  .cover-card {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--bg-subtle) 0%, var(--bg-muted) 100%);
    border: 1px solid var(--border-faint);
    padding: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
  }
  
  .cover-card:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
    box-shadow: 0 12px 24px rgba(0,0,0,0.3),
                0 0 1px var(--accent);
  }

  .cover-img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    display: block;
    background: var(--bg-base);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 12px 12px 0 0;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }
  
  .cover-card:hover .cover-img { 
    transform: scale(1.08) rotate(0.5deg);
  }

  .cover-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 40%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: flex-end;
    padding: 16px;
    border-radius: 12px;
  }
  
  .cover-card:hover .cover-overlay { 
    opacity: 1;
  }

  .cover-title {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    line-height: 1.4;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* ── Activity grid (recent plays) ── */
  .activity-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  
  @media (max-width: 768px) {
    .activity-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
  }
  
  @media (max-width: 480px) {
    .activity-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
  }

  .activity-card { 
    cursor: pointer;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, var(--bg-subtle) 0%, var(--bg-muted) 100%);
    border-radius: 12px;
    padding: 14px;
    border: 1px solid var(--border-faint);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    position: relative;
  }
  
  .activity-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  
  .activity-card:hover {
    transform: translateY(-6px);
    background: linear-gradient(135deg, var(--bg-muted) 0%, var(--bg-base) 100%);
    border-color: var(--accent);
    box-shadow: 0 12px 24px rgba(0,0,0,0.3), 
                0 0 1px var(--accent);
  }
  
  .activity-card:hover::before {
    opacity: 1;
  }

  .activity-cover-wrap {
    overflow: hidden;
    border-radius: 10px;
    margin-bottom: 12px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.1);
    aspect-ratio: 2/3;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
  }
  
  .activity-cover-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
    pointer-events: none;
    border-radius: 10px;
  }

  .activity-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: var(--bg-base);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }
  
  .activity-card:hover .activity-cover { 
    transform: scale(1.08) rotate(0.5deg);
  }

  .activity-game-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    margin: 0 0 8px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .activity-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }

  .activity-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 800;
    color: var(--bg-base);
    flex-shrink: 0;
  }

  .activity-username {
    font-size: 12px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 600;
    flex: 1;
  }

  .activity-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 8px;
  }

  /* ── Stars ── */
  .star-row { 
    display: flex; 
    gap: 3px;
    align-items: center;
  }
  .star { 
    font-size: 13px;
    color: #ffd700;
    line-height: 1;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4),
                 0 0 8px rgba(255,215,0,0.3);
    transition: transform 0.2s;
  }
  .star-row:hover .star {
    transform: scale(1.15);
  }
  .star.empty { 
    color: var(--border-muted);
    opacity: 0.3;
  }

  .activity-date {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
    white-space: nowrap;
  }
  
  .activity-preview {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.5;
    max-height: 3.3em;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    padding-top: 4px;
    border-top: 1px solid var(--border-faint);
    margin-top: 8px;
    font-style: italic;
    opacity: 0.85;
  }

  /* ── Popular reviews ── */
  .reviews-list {
    display: flex;
    flex-direction: column;
  }

  .review-row {
    display: flex;
    gap: 16px;
    padding: 18px 0;
    border-bottom: 1px solid var(--border-faint);
    cursor: pointer;
  }

  .review-cover {
    width: 46px;
    height: 62px;
    object-fit: cover;
    border-radius: 3px;
    background: var(--bg-subtle);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.3s ease-in;
  }

  .review-body { flex: 1; min-width: 0; }

  .review-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .review-game-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .review-game-year  { font-size: 11px; color: var(--text-dim); }

  .review-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .review-footer {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .reviewer-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 800;
    color: var(--bg-base);
    flex-shrink: 0;
  }

  .reviewer-name { font-size: 12px; color: var(--text-muted); }
  .review-date   { font-size: 11px; color: var(--text-dim); }
  .review-likes  { margin-left: auto; font-size: 11px; color: var(--text-dim); }

  /* ── Loading skeleton ── */
  .skeleton-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  
  @media (max-width: 768px) {
    .skeleton-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
  }
  
  @media (max-width: 480px) {
    .skeleton-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
  }

  .skeleton-card {
    display: flex;
    flex-direction: column;
    background: var(--bg-subtle);
    border-radius: 10px;
    padding: 12px;
    gap: 8px;
  }

  .skeleton-cover {
    width: 100%;
    aspect-ratio: 2 / 3;
    background: var(--bg-subtle);
    border-radius: 8px;
    animation: shimmer 1.4s infinite;
  }

  .skeleton-title {
    height: 12px;
    background: var(--bg-subtle);
    border-radius: 4px;
    animation: shimmer 1.4s infinite;
    width: 85%;
  }

  .skeleton-meta {
    display: flex;
    gap: 6px;
    height: 10px;
  }

  .skeleton-meta div {
    background: var(--bg-subtle);
    border-radius: 4px;
    animation: shimmer 1.4s infinite;
  }

  .skeleton-review {
    display: flex;
    gap: 16px;
    padding: 18px 0;
    border-bottom: 1px solid var(--border-faint);
  }

  .skeleton-thumb {
    width: 46px;
    height: 62px;
    background: var(--bg-subtle);
    border-radius: 3px;
    flex-shrink: 0;
    animation: shimmer 1.4s infinite;
  }

  .skeleton-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }

  .skeleton-line {
    height: 10px;
    background: var(--bg-subtle);
    border-radius: 4px;
    animation: shimmer 1.4s infinite;
  }

  @keyframes shimmer {
    0%   { opacity: 0.4; }
    50%  { opacity: 0.8; }
    100% { opacity: 0.4; }
  }

  /* ── Empty / error states ── */
  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    background: var(--bg-subtle);
    border-radius: 10px;
    border: 1px dashed var(--border-faint);
  }
</style>

<script>
  // ── Helpers ────────────────────────────────────────────────

  function stars(rating) {
    // rating: 1–5, supports half stars if you pass e.g. 4.5
    const full  = Math.floor(rating)
    const empty = 5 - Math.ceil(rating)
    let html = ''
    for (let i = 0; i < full;  i++) html += '<span class="star">★</span>'
    for (let i = 0; i < empty; i++) html += '<span class="star empty">★</span>'
    return `<div class="star-row">${html}</div>`
  }

  function avatar(username) {
    return (username || '?')[0].toUpperCase()
  }

  function formatDate(dateStr) {
    // expects ISO string or any Date-parseable value from your backend
    if (!dateStr) return ''
    const d = new Date(dateStr)
    const now = new Date()
    const diffMs = now - d
    const diffMins = Math.floor(diffMs / 60000)
    const diffHours = Math.floor(diffMs / 3600000)
    const diffDays = Math.floor(diffMs / 86400000)
    
    if (diffMins < 1) return 'Just now'
    if (diffMins < 60) return `${diffMins}m ago`
    if (diffHours < 24) return `${diffHours}h ago`
    if (diffDays < 7) return `${diffDays}d ago`
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
  }

  function coverImg(url, title) {
    // Upgrade IGDB thumbnails to high-quality covers
    let fullUrl = url || '';
    if (fullUrl && fullUrl.includes('images.igdb.com')) {
      fullUrl = fullUrl.replace('t_thumb', 't_cover_big');
      if (!fullUrl.startsWith('https:')) {
        fullUrl = 'https:' + fullUrl;
      }
    }
    return `<img class="cover-img" src="${fullUrl}" alt="${title || ''}"
              onerror="this.style.opacity='0'" />`
  }

  function hide(id) { document.getElementById(id).style.display = 'none' }
  function show(id, display = 'block') { document.getElementById(id).style.display = display }

  // ── Render functions ────────────────────────────────────────
  // Each function receives the JSON your backend returns and
  // builds the HTML. Adjust property names to match your schema.

  /**
   * renderRecentActivity(entries)
   *
   * Expected shape per entry:
   * {
   *   game: { title, cover_url },
   *   user: { username },
   *   rating: 4,          // 1–5
   *   body: "Review preview text...",
   *   played_at: "2025-06-18T..."
   * }
   */
  function renderRecentActivity(entries) {
    const grid = document.getElementById('recent-activity-grid')

    if (!entries || entries.length === 0) {
      grid.innerHTML = '<p class="empty-state">No recent activity yet.</p>'
      hide('recent-activity-skeleton')
      show('recent-activity-grid')
      return
    }

    grid.innerHTML = entries.map(e => `
      <div class="activity-card" onclick="location.href='/review-page?id=${e.id}'">
        <div class="activity-cover-wrap">
          ${coverImg(e.game.cover_url, e.game.title)}
        </div>
        <h3 class="activity-game-title" title="${e.game.title}">${e.game.title}</h3>
        <div class="activity-meta">
          <div class="activity-avatar" title="${e.user.username}">${avatar(e.user.username)}</div>
          <span class="activity-username" title="${e.user.username}">${e.user.username}</span>
        </div>
        <div class="activity-bottom">
          ${stars(e.rating)}
          <span class="activity-date">${formatDate(e.played_at)}</span>
        </div>
        ${e.body ? `<div class="activity-preview">${e.body}</div>` : ''}
      </div>
    `).join('')

    hide('recent-activity-skeleton')
    show('recent-activity-grid', 'grid')
  }

  /**
   * renderPopularGames(games)
   *
   * Expected shape per game:
   * {
   *   id, title, cover_url
   * }
   */
  function renderPopularGames(games) {
    const grid = document.getElementById('popular-games-grid')

    if (!games || games.length === 0) {
      grid.innerHTML = '<p class="empty-state">No games yet.</p>'
      hide('popular-games-skeleton')
      show('popular-games-grid')
      return
    }

    grid.innerHTML = games.map(g => `
      <div class="cover-card" onclick="location.href='/games/${g.id}'">
        ${coverImg(g.cover_url, g.title)}
        <div class="cover-overlay">
          <span class="cover-title">${g.title}</span>
        </div>
      </div>
    `).join('')

    hide('popular-games-skeleton')
    show('popular-games-grid', 'grid')
  }

  /**
   * renderPopularReviews(reviews)
   *
   * Expected shape per review:
   * {
   *   id,
   *   game: { title, cover_url, release_year },
   *   user: { username },
   *   rating: 5,
   *   body: "Review text...",
   *   likes: 842,
   *   created_at: "2025-06-18T..."
   * }
   */
  function renderPopularReviews(reviews) {
    const list = document.getElementById('popular-reviews-list')

    if (!reviews || reviews.length === 0) {
      list.innerHTML = '<p class="empty-state">No reviews yet.</p>'
      hide('popular-reviews-skeleton')
      show('popular-reviews-list')
      return
    }

    list.innerHTML = reviews.map(r => `
      <div class="review-row" onclick="location.href='/review-page?id=${r.id}'">
        <img class="review-cover" src="${r.game.cover_url || ''}" alt="${r.game.title}"
             onload="this.style.opacity='1'" />
        <div class="review-body">
          <div class="review-top">
            <span class="review-game-title">${r.game.title}</span>
            <span class="review-game-year">${r.game.release_year || ''}</span>
            ${stars(r.rating)}
          </div>
          <p class="review-text">${r.body}</p>
          <div class="review-footer">
            <div class="reviewer-avatar">${avatar(r.user.username)}</div>
            <span class="reviewer-name">${r.user.username}</span>
            <span class="review-date">${formatDate(r.created_at)}</span>
            <span class="review-likes">♥ ${r.likes || 0}</span>
          </div>
        </div>
      </div>
    `).join('')

    hide('popular-reviews-skeleton')
    show('popular-reviews-list')
  }

  // ── Fetch from backend ──────────────────────────────────────

  async function loadHomepage() {
    // Check authentication
    try {
      const profile = await (await fetch('/api/users/@me')).json()
      if (!profile || !profile.id) {
        // Not authenticated, redirect to landing page
        location.href = '/'
        return
      }
      
      // User is authenticated
      document.getElementById('welcome-username').textContent = profile.username
      document.getElementById('welcome-banner').style.display = 'block'
    } catch (_) {
      // Error fetching profile, redirect to landing page
      location.href = '/'
      return
    }

    // Recent activity  →  GET /api/activity/recent
    fetch('/api/activity/recent')
      .then(r => r.json())
      .then(data => renderRecentActivity(data))
      .catch(() => renderRecentActivity([]))

    // Popular games  →  GET /api/games/trending
    fetch('/api/games/trending')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        console.log('Trending games loaded:', data);
        renderPopularGames(data);
      })
      .catch(err => {
        console.error('Failed to load trending games:', err);
        renderPopularGames([]);
      })

    // Popular reviews  →  GET /api/reviews/popular
    fetch('/api/reviews/popular')
      .then(r => r.json())
      .then(data => renderPopularReviews(data))
      .catch(() => renderPopularReviews([]))
  }

  loadHomepage()
</script>
