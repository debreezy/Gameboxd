
<style>
  .hero {
    position: relative;
    overflow: hidden;
    padding: 96px 24px 88px;
    text-align: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1f1a0e 0%, #0d0b08 70%);
  }

.hero-grid {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image:
    linear-gradient(#d4a843 1px, transparent 1px),
    linear-gradient(90deg, #d4a843 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-inner {
  max-width: 700px;
  margin: 0 auto;
  position: relative;
}

.hero-tagline {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
  animation: fadeUp 0.7s ease both;
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(40px, 6vw, 68px);
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.03em;
  color: var(--text-primary);
  margin-bottom: 22px;
  animation: fadeUp 0.7s 0.1s ease both;
}

.hero-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}

.hero-sub {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
  max-width: 480px;
  margin: 0 auto 36px;
  animation: fadeUp 0.7s 0.2s ease both;
}

.hero-cta {
  display: flex;
  gap: 12px;
  justify-content: center;
  animation: fadeUp 0.7s 0.3s ease both;
}

.hero-cta .btn-primary,
.hero-cta .btn-ghost {
  padding: 13px 32px;
  font-size: 12px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: none; }
}
</style>

<!-- ── HERO ── -->
<section class="hero">
  <div class="hero-grid"></div>
  <div class="hero-inner">
    <p class="hero-tagline">Track · Rate · Discover</p>
    <h1 class="hero-title">
      Your game diary,<br>
      <em>beautifully kept.</em>
    </h1>
    <p class="hero-sub">
      Log every game you play, write reviews, and share your taste
      with a community of players who take games seriously.
    </p>
    <div class="hero-cta">
      <button class="btn-primary" id="hero-signup">Get started — it's free</button>
      <button class="btn-ghost">See how it works</button>
    </div>
  </div>
</section>

<!-- ── MAIN CONTENT (games + reviews go here) ── -->
<div class="page-content">
  <!-- TODO: Popular Games section -->
  <!-- TODO: Recent Reviews section -->
</div>

<!-- ── Page-specific JS ── -->
<script>
  document.getElementById('open-login').addEventListener('click',  () => window.location.href = '/login')
  document.getElementById('open-signup').addEventListener('click', () => window.location.href = '/signup')
  document.getElementById('hero-signup').addEventListener('click', () => window.location.href = '/signup')

</script>
