<style>
  /* ── Hero ── */
  .hero {
    position: relative;
    overflow: hidden;
    padding: 96px 24px 88px;
    text-align: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1f1a0e 0%, #0d0b08 70%);
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      linear-gradient(#d4a843 1px, transparent 1px),
      linear-gradient(90deg, #d4a843 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .hero-inner {
    max-width: 700px;
    margin: 0 auto;
    position: relative;
  }

  .hero-tagline {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    animation: fadeUp 0.7s ease both;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 6vw, 68px);
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    margin-bottom: 22px;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .hero-title em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .hero-sub {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto 36px;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .hero-cta {
    display: flex;
    gap: 12px;
    justify-content: center;
    animation: fadeUp 0.7s 0.3s ease both;
  }

  .hero-cta .btn-primary,
  .hero-cta .btn-ghost {
    padding: 13px 32px;
    font-size: 12px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Auth modal overlay ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.15s ease;
  }

  .overlay.hidden { display: none; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--bg-surface);
    border: 1px solid var(--border-muted);
    border-radius: 10px;
    padding: 36px 40px;
    width: 100%;
    max-width: 380px;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: none; }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .modal-subtitle {
    color: var(--text-dim);
    font-size: 12px;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--text-primary); }

  /* ── Inputs ── */
  .input-field {
    width: 100%;
    background: var(--bg-subtle);
    border: 1px solid var(--border-muted);
    border-radius: 5px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: var(--font-body);
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
    display: block;
  }
  .input-field::placeholder { color: var(--text-dim); }
  .input-field:focus        { border-color: var(--text-muted); }

  .forgot-link {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 12px;
    font-family: var(--font-body);
    cursor: pointer;
    display: block;
    text-align: right;
    margin-top: -4px;
    margin-bottom: 4px;
    transition: color 0.2s;
  }
  .forgot-link:hover { color: var(--text-primary); }

  .modal-submit {
    width: 100%;
    padding: 12px;
    font-size: 12px;
    margin-top: 20px;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border-muted);
    margin: 24px 0;
    position: relative;
  }
  .divider span {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg-surface);
    padding: 0 12px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .google-btn {
    width: 100%;
    padding: 11px;
    font-size: 12px;
  }

  .modal-switch {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 20px;
  }

  .switch-link {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 12px;
    font-family: var(--font-body);
    cursor: pointer;
    padding: 0;
    transition: color 0.2s;
  }
  .switch-link:hover { color: var(--accent-hover); }
</style>

<!-- ── HERO ── -->
<section class="hero">
  <div class="hero-grid"></div>
  <div class="hero-inner">
    <p class="hero-tagline">Track · Rate · Discover</p>
    <h1 class="hero-title">
      Your game diary,<br>
      <em>beautifully kept.</em>
    </h1>
    <p class="hero-sub">
      Log every game you play, write reviews, and share your taste
      with a community of players who take games seriously.
    </p>
    <div class="hero-cta">
      <button class="btn-primary" id="hero-signup">Get started — it's free</button>
      <button class="btn-ghost">See how it works</button>
    </div>
  </div>
</section>

<!-- ── MAIN CONTENT (games + reviews go here) ── -->
<div class="page-content">
  <!-- TODO: Popular Games section -->
  <!-- TODO: Recent Reviews section -->
</div>

<!-- ── AUTH MODAL ── -->
<div class="overlay hidden" id="auth-overlay">
  <div class="modal" id="auth-modal">

    <div class="modal-header">
      <div>
        <h2 class="modal-title" id="modal-title">Welcome back</h2>
        <p class="modal-subtitle" id="modal-subtitle">Sign in to your account</p>
      </div>
      <button class="modal-close" id="close-modal">×</button>
    </div>

    <input class="input-field" id="field-username" type="text" placeholder="Username" style="display:none" />
    <input class="input-field" id="field-email" type="email" placeholder="Email address" />
    <input class="input-field" id="field-password" type="password" placeholder="Password" style="margin-bottom:0" />

    <button class="forgot-link" id="forgot-btn">Forgot password?</button>

    <button class="btn-primary modal-submit" id="modal-submit">Sign in</button>

    <div class="divider"><span>or</span></div>

    <button class="btn-ghost google-btn">Continue with Google</button>

    <p class="modal-switch">
      <span id="switch-text">Don't have an account? </span>
      <button class="switch-link" id="switch-btn">Sign up</button>
    </p>

  </div>
</div>

<!-- ── Page-specific JS ── -->
<script>
  let mode = 'login' // 'login' | 'signup'

  const overlay       = document.getElementById('auth-overlay')
  const modalTitle    = document.getElementById('modal-title')
  const modalSubtitle = document.getElementById('modal-subtitle')
  const fieldUsername = document.getElementById('field-username')
  const forgotBtn     = document.getElementById('forgot-btn')
  const submitBtn     = document.getElementById('modal-submit')
  const switchText    = document.getElementById('switch-text')
  const switchBtn     = document.getElementById('switch-btn')

  function setMode(m) {
    mode = m
    if (mode === 'login') {
      modalTitle.textContent      = 'Welcome back'
      modalSubtitle.textContent   = 'Sign in to your account'
      fieldUsername.style.display = 'none'
      forgotBtn.style.display     = 'block'
      submitBtn.textContent       = 'Sign in'
      switchText.textContent      = "Don't have an account? "
      switchBtn.textContent       = 'Sign up'
    } else {
      modalTitle.textContent      = 'Join Gameboxd'
      modalSubtitle.textContent   = 'Start logging your games today'
      fieldUsername.style.display = 'block'
      forgotBtn.style.display     = 'none'
      submitBtn.textContent       = 'Create account'
      switchText.textContent      = 'Already have an account? '
      switchBtn.textContent       = 'Sign in'
    }
  }

  function openModal(m) {
    setMode(m)
    overlay.classList.remove('hidden')
  }

  function closeModal() {
    overlay.classList.add('hidden')
  }

  document.getElementById('open-login').addEventListener('click',  () => openModal('login'))
  document.getElementById('open-signup').addEventListener('click', () => openModal('signup'))
  document.getElementById('hero-signup').addEventListener('click', () => openModal('signup'))
  document.getElementById('close-modal').addEventListener('click', closeModal)
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal() })
  switchBtn.addEventListener('click', () => setMode(mode === 'login' ? 'signup' : 'login'))

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal() })
</script>
